<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sri's Favourite 😄</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    font-family: 'Comic Sans MS', cursive, sans-serif;
    background: linear-gradient(135deg, #ff9a9e, #fad0c4);
    height: 100vh;
}

h2 {
    text-align: center;
    margin-top: 120px;
    color: white;
    font-size: 30px;
    text-shadow: 2px 2px 6px #ff4b5c;
}

button {
    position: absolute;
    padding: 12px 22px;
    font-size: 18px;
    border: none;
    border-radius: 30px;
    cursor: pointer;
    color: white;
    box-shadow: 0 6px 15px rgba(0,0,0,0.3);
    transition: transform 0.2s;
}

button:hover {
    transform: scale(1.1);
}

#sara { background: #ff6f91; }
#paapa { background: #ff9671; }
#hari { 
    background: #00c9a7; 
    left: 50%; 
    top: 65%; 
    transform: translateX(-50%);
}
</style>
</head>

<body>

<h2>Whom Does Sri like the most? ❤️</h2>

<button id="sara">Sara</button>
<button id="paapa">Paapa</button>
<button id="hari">Hari ❤️</button>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>
const sara = document.getElementById("sara");
const paapa = document.getElementById("paapa");
const hari = document.getElementById("hari");

// Set SAFE initial positions
sara.style.left = "25%";
sara.style.top = "60%";

paapa.style.left = "65%";
paapa.style.top = "60%";

// Safe random movement (never off screen)
function moveButton(btn) {
    const maxX = window.innerWidth - btn.offsetWidth - 20;
    const maxY = window.innerHeight - btn.offsetHeight - 20;

    const x = Math.random() * maxX;
    const y = Math.random() * maxY;

    btn.style.left = x + "px";
    btn.style.top = y + "px";
}

// Desktop hover
sara.onmouseover = () => moveButton(sara);
paapa.onmouseover = () => moveButton(paapa);

// Mobile touch
sara.ontouchstart = () => moveButton(sara);
paapa.ontouchstart = () => moveButton(paapa);

// Hari click
hari.onclick = function() {
    alert("Love you Hari 💖");

    confetti({
        particleCount: 250,
        spread: 90,
        origin: { y: 0.6 }
    });
};
</script>

</body>
</html>
